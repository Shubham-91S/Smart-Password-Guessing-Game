<!DOCTYPE html>
<html>

<head>

    <title>Congratulations!</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <h1>🎉 Congratulations!</h1>

    <p>You guessed the password correctly!</p>

    <div class="hint">

        <h3>🔑 Correct Password</h3>

        <h2>{{ word }}</h2>

    </div>

    <h2>⭐ Your Score: {{ score }}</h2>

    <h2>⏱ Time Taken: {{ time_taken }} seconds</h2>

    <br>

    <a href="/start">
        <button>🎮 Play Again</button>
    </a>

    <a href="/leaderboard">
        <button>🏆 Leaderboard</button>
    </a>

    <a href="/history">
        <button>📜 History</button>
    </a>

    <a href="/">
        <button>🏠 Home</button>
    </a>

</div>

</body>

</html>
